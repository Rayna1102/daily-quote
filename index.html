<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日一句">
<meta name="theme-color" content="#1a1a2e">
<title>每日一句</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent-pos: #f6c90e;
    --accent-neg: #e94560;
    --text: #eaeaea;
    --text-muted: #888;
    --radius: 20px;
    --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(246,201,14,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(233,69,96,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Header */
  header {
    padding: 52px 0 8px;
    text-align: center;
  }
  header .date-label {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 4px;
  }
  header h1 span {
    color: var(--accent-pos);
  }

  /* Main quote card */
  .quote-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 36px 28px 28px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: var(--transition);
  }
  .quote-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent-pos));
    border-radius: var(--radius) var(--radius) 0 0;
    transition: var(--transition);
  }
  .quote-card.negative::before { --card-accent: var(--accent-neg); }

  .quote-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    margin-bottom: 20px;
    transition: var(--transition);
  }
  .quote-card.positive .quote-type-badge { color: var(--accent-pos); }
  .quote-card.negative .quote-type-badge { color: var(--accent-neg); }

  .quote-mark {
    font-family: 'Noto Serif TC', serif;
    font-size: 64px;
    line-height: 0.6;
    color: var(--card-accent, var(--accent-pos));
    opacity: 0.25;
    position: absolute;
    top: 52px;
    right: 24px;
    transition: var(--transition);
  }
  .quote-card.negative .quote-mark { --card-accent: var(--accent-neg); }

  .quote-text {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(17px, 4.5vw, 22px);
    line-height: 1.85;
    color: var(--text);
    letter-spacing: 0.03em;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.5s forwards 0.1s;
  }

  .quote-author {
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: right;
    opacity: 0;
    animation: fadeUp 0.5s forwards 0.2s;
  }
  .quote-author::before { content: '— '; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--accent-pos);
    color: #1a1a00;
  }
  .btn-primary:active { transform: scale(0.97); background: #d4a90b; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-secondary:active { transform: scale(0.97); }

  /* Add quote section */
  .section-title {
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-left: 4px;
  }

  .add-form {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .add-form textarea {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-form textarea:focus { border-color: rgba(246,201,14,0.4); }
  .add-form textarea::placeholder { color: var(--text-muted); font-size: 14px; }

  .add-form input[type="text"] {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-form input:focus { border-color: rgba(246,201,14,0.4); }
  .add-form input::placeholder { color: var(--text-muted); }

  .tone-select {
    display: flex;
    gap: 8px;
  }
  .tone-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tone-btn.selected-pos { border-color: var(--accent-pos); color: var(--accent-pos); background: rgba(246,201,14,0.06); }
  .tone-btn.selected-neg { border-color: var(--accent-neg); color: var(--accent-neg); background: rgba(233,69,96,0.06); }

  /* Custom quotes list */
  .quotes-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quote-item {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp 0.3s both;
  }
  .quote-item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }
  .quote-item-dot.pos { background: var(--accent-pos); }
  .quote-item-dot.neg { background: var(--accent-neg); }

  .quote-item-body { flex: 1; }
  .quote-item-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .quote-item-author {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--accent-neg); }

  .empty-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 20px 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(30,30,50,0.95);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 999;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-label" id="dateLabel"></div>
    <h1>每日<span>一句</span></h1>
  </header>

  <!-- Today's quote -->
  <div class="quote-card" id="quoteCard">
    <div class="quote-type-badge" id="quoteTypeBadge"></div>
    <div class="quote-mark">"</div>
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="shuffleBtn" onclick="shuffleQuote()">
      🎲 再抽一句
    </button>
    <button class="btn btn-secondary" id="todayBtn" onclick="showTodayQuote()">
      📅 今日語錄
    </button>
  </div>

  <div class="divider"></div>

  <!-- Add new quote -->
  <div class="section-title">✏️ 新增語錄</div>
  <div class="add-form">
    <textarea id="newQuoteText" placeholder="輸入你想記住的句子…"></textarea>
    <input type="text" id="newQuoteAuthor" placeholder="出處 / 作者（選填）">
    <div class="tone-select">
      <button class="tone-btn selected-pos" id="tonePos" onclick="selectTone('positive')">☀️ 正能量</button>
      <button class="tone-btn" id="toneNeg" onclick="selectTone('negative')">🌑 反思語錄</button>
    </div>
    <button class="btn btn-primary" onclick="addQuote()" style="border-radius:12px; padding:14px;">
      + 儲存句子
    </button>
  </div>

  <div class="divider"></div>

  <!-- Custom quotes list -->
  <div class="section-title">📚 我的收藏</div>
  <div class="quotes-list" id="customList"></div>

</div>
<div class="toast" id="toast"></div>

<script>
const BUILT_IN = [
  { text: "每一天都是全新的開始，昨天的失敗不代表明天的結局。", author: "佚名", type: "positive" },
  { text: "你比你想像中的更勇敢，比你看起來更強大，比你以為的更聰明。", author: "小熊維尼", type: "positive" },
  { text: "不要等到萬事俱備，因為那一天永遠不會到來。", author: "拿破崙·希爾", type: "positive" },
  { text: "成功不是終點，失敗也不是末日，繼續前進才是最重要的。", author: "邱吉爾", type: "positive" },
  { text: "生命中最重要的不是你站在哪裡，而是你朝哪個方向走。", author: "歌德", type: "positive" },
  { text: "別讓別人的意見，淹沒你內心的聲音。", author: "賈伯斯", type: "positive" },
  { text: "即使走得很慢，只要不停下來，就是進步。", author: "孔子", type: "positive" },
  { text: "種一棵樹最好的時機是十年前，其次是現在。", author: "中國諺語", type: "positive" },
  { text: "不是所有努力都有回報，但不努力什麼都不會有。", author: "佚名", type: "negative" },
  { text: "這世界不欠你任何東西，它比你先存在。", author: "馬克·吐溫", type: "negative" },
  { text: "你最害怕的那件事，往往就是你最需要去做的事。", author: "卡爾·榮格", type: "negative" },
  { text: "快樂不是目的地，而是旅途中不斷選擇的方式。", author: "愛默生", type: "negative" },
  { text: "大多數人的問題不是無知，而是對自己的無知毫不知情。", author: "查理·蒙格", type: "negative" },
  { text: "時間是最公平的資源，每個人一天都只有二十四小時。", author: "佚名", type: "negative" },
  { text: "當你覺得累了，不是因為走了太多路，而是路上帶了太多不必要的重量。", author: "佚名", type: "negative" },
];

let selectedTone = 'positive';
let currentIndex = -1;

function getAllQuotes() {
  const custom = JSON.parse(localStorage.getItem('myQuotes') || '[]');
  return [...BUILT_IN, ...custom];
}

function getDayIndex() {
  const now = new Date();
  const seed = now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
  return seed % getAllQuotes().length;
}

function renderQuote(q, animate = true) {
  const card = document.getElementById('quoteCard');
  const text = document.getElementById('quoteText');
  const author = document.getElementById('quoteAuthor');
  const badge = document.getElementById('quoteTypeBadge');

  card.className = 'quote-card ' + q.type;
  badge.textContent = q.type === 'positive' ? '☀️ 正能量' : '🌑 反思語錄';
  author.textContent = q.author || '';

  if (animate) {
    text.style.animation = 'none';
    author.style.animation = 'none';
    text.offsetHeight; // reflow
    text.style.animation = '';
    author.style.animation = '';
  }
  text.textContent = q.text;
}

function showTodayQuote() {
  const all = getAllQuotes();
  const idx = getDayIndex();
  currentIndex = idx;
  renderQuote(all[idx]);
  showToast('📅 今日語錄');
}

function shuffleQuote() {
  const all = getAllQuotes();
  let idx;
  do { idx = Math.floor(Math.random() * all.length); } while (idx === currentIndex && all.length > 1);
  currentIndex = idx;
  renderQuote(all[idx]);
}

function selectTone(tone) {
  selectedTone = tone;
  document.getElementById('tonePos').className = 'tone-btn' + (tone === 'positive' ? ' selected-pos' : '');
  document.getElementById('toneNeg').className = 'tone-btn' + (tone === 'negative' ? ' selected-neg' : '');
}

function addQuote() {
  const text = document.getElementById('newQuoteText').value.trim();
  const author = document.getElementById('newQuoteAuthor').value.trim();
  if (!text) { showToast('請先輸入句子內容'); return; }

  const custom = JSON.parse(localStorage.getItem('myQuotes') || '[]');
  custom.push({ text, author: author || '我', type: selectedTone, id: Date.now() });
  localStorage.setItem('myQuotes', JSON.stringify(custom));

  document.getElementById('newQuoteText').value = '';
  document.getElementById('newQuoteAuthor').value = '';
  renderCustomList();
  showToast('✅ 句子已儲存！');
}

function deleteQuote(id) {
  let custom = JSON.parse(localStorage.getItem('myQuotes') || '[]');
  custom = custom.filter(q => q.id !== id);
  localStorage.setItem('myQuotes', JSON.stringify(custom));
  renderCustomList();
  showToast('🗑️ 已刪除');
}

function renderCustomList() {
  const custom = JSON.parse(localStorage.getItem('myQuotes') || '[]');
  const list = document.getElementById('customList');
  if (custom.length === 0) {
    list.innerHTML = '<div class="empty-hint">還沒有收藏的句子<br>新增你的第一句吧！</div>';
    return;
  }
  list.innerHTML = custom.map(q => `
    <div class="quote-item">
      <div class="quote-item-dot ${q.type === 'positive' ? 'pos' : 'neg'}"></div>
      <div class="quote-item-body">
        <div class="quote-item-text">${escHtml(q.text)}</div>
        <div class="quote-item-author">${escHtml(q.author || '我')}</div>
      </div>
      <button class="delete-btn" onclick="deleteQuote(${q.id})" title="刪除">×</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function initDate() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  const label = `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日　星期${days[now.getDay()]}`;
  document.getElementById('dateLabel').textContent = label;
}

// Init
initDate();
showTodayQuote();
renderCustomList();
</script>
</body>
</html>
